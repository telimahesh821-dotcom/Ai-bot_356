<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Mobile Assistant</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            background-color: #000;
            color: #00d4ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        /* The Arc Reactor */
        .arc-reactor {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00d4ff;
            box-shadow: 0 0 15px #00d4ff, inset 0 0 15px #00d4ff;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .arc-reactor::after {
            content: "";
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px dashed #00d4ff;
        }

        /* Pulse animation when listening */
        .listening {
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 40px #00d4ff, inset 0 0 20px #00d4ff;
            border-color: #fff;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            letter-spacing: 5px;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #transcriptText {
            color: #aaa;
            font-size: 0.9rem;
            min-height: 50px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        button {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:active {
            background: #00d4ff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="arc-reactor" id="orb"></div>
        <h1 id="status">System Offline</h1>
        <p id="transcriptText">Awaiting command, sir.</p>
        <button id="startBtn">Initialize Jarvis</button>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const orb = document.getElementById('orb');
        const transcriptText = document.getElementById('transcriptText');

        // Replace with your OpenAI API Key
        const API_KEY = "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"; 

        // 1. Check for Browser Support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Your browser does not support Speech Recognition. Please use Chrome on Android or Safari on iOS.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            // 2. Button Click Listener
            startBtn.addEventListener('click', () => {
                recognition.start();
                startBtn.innerText = "Listening...";
            });

            recognition.onstart = () => {
                status.innerText = "Listening...";
                orb.classList.add('listening');
            };

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                transcriptText.innerText = `You: "${userText}"`;
                
                status.innerText = "Processing...";
                orb.classList.remove('listening');
                
                await askJarvis(userText);
            };

            recognition.onerror = (err) => {
                console.error(err);
                status.innerText = "Error";
                orb.classList.remove('listening');
                startBtn.innerText = "Try Again";
            };

            // 3. Talk to OpenAI
            async function askJarvis(query) {
                try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [
                                { role: "system", content: "You are Jarvis from Iron Man. Be polite, concise, and refer to the user as 'sir'. Your tone is sophisticated and helpful." },
                                { role: "user", content: query }
                            ]
                        })
                    });

                    const data = await response.json();
                    const aiReply = data.choices[0].message.content;
                    
                    speak(aiReply);
                } catch (error) {
                    speak("I am having trouble connecting to my servers, sir.");
                }
            }

            // 4. Text to Speech (Voice)
            function speak(text) {
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Fine-tuning the voice
                utterance.rate = 1.0; 
                utterance.pitch = 0.9; // Slightly deeper for Jarvis

                // Try to find a British English male voice
                const voices = window.speechSynthesis.getVoices();
                const jarvisVoice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Arthur'));
                if (jarvisVoice) utterance.voice = jarvisVoice;

                window.speechSynthesis.speak(utterance);
                
                status.innerText = "Online";
                transcriptText.innerText = text;
                startBtn.innerText = "Talk Again";
            }
        }
        
        // Fix for voices not loading immediately
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
